# SignalTrace scripted input
# Edit ENDPOINT and TOKEN in bin/signaltrace_fetch.sh before enabling.
#
# Setup instructions: https://github.com/veddegre/signaltrace/wiki/Splunk-Integration
#
# Fields indexed per event (all extracted automatically via KV_MODE = json):
#
#   Core:       id, event_type, clicked_at, clicked_at_unix_ms, token, link_id
#   Network:    ip, ip_asn, ip_org, ip_country, x_forwarded_for, remote_port
#   Scoring:    confidence_score, confidence_label, confidence_reason,
#               is_bot, bot_reason, first_for_token, prior_events_for_token
#   Request:    request_method, request_uri, query_string, scheme, request_host,
#               referer, user_agent, accept, accept_language, accept_encoding,
#               sec_fetch_site, sec_fetch_mode, sec_fetch_dest,
#               sec_ch_ua, sec_ch_ua_platform
#   Token:      description, destination, exclude_from_feed,
#               force_include_in_feed, include_in_email, include_in_token_webhook
#   Visitor:    visitor_hash
#
# Derived fields (via props.conf EVALs):
#   confidence_reasons_mv  multivalue split of confidence_reason
#   subdomain              extracted subdomain label from host
#   is_known_token         true/false whether link_id is set
#   is_bot_bool            true/false coercion of is_bot integer
#   confidence_score_num   numeric-typed confidence_score

[script://./bin/signaltrace_fetch.sh]
disabled  = true
interval  = 300
sourcetype = signaltrace
index     = security
source    = signaltrace:export
