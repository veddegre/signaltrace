name: Regression tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  php-regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Run regression tests
        run: php tests/regression.php
